<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Aura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Au<span>ra.</span></a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-container">
        <h1 class="page-title">Join The Club</h1>
        <div class="form-container">
            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" required placeholder="+91 00000 00000">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="pass" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-pass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn" style="width: 100%;">Create Account</button>
            </form>
            <div class="form-footer">
                Already a member? <a href="login.html">Login Here</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
